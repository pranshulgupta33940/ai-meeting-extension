<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meet Summarizer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- SECTION 1 — HEADER -->
    <header class="header">
      <div class="header-left">
        <div class="logo-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="logo-text">
          <div class="logo-title">Meet Summarizer</div>
          <div class="logo-subtitle">AI-powered notes</div>
        </div>
      </div>
      <div id="status-badge" class="badge badge--idle">
        <div class="pulse-dot" id="pulse-dot"></div>
        <span id="badge-text">Idle</span>
      </div>
    </header>

    <!-- SECTION 2 — STATS ROW -->
    <section class="stats-row">
      <div class="stat-col">
        <div class="stat-value" id="word-count">0</div>
        <div class="stat-label">words</div>
      </div>
      <div class="stat-col divider">
        <div class="stat-value" id="line-count">0</div>
        <div class="stat-label">lines</div>
      </div>
      <div class="stat-col divider">
        <div class="stat-value" id="speaker-count">0</div>
        <div class="stat-label">speakers</div>
      </div>
    </section>

    <!-- SECTION 3 — SPEAKER CHIPS -->
    <section class="speaker-section">
      <div class="section-label">In call:</div>
      <div id="speaker-chips" class="speaker-chips-container">
        <!-- Chips injected by JS -->
      </div>
    </section>

    <!-- SECTION 4 — LIVE TRANSCRIPT PREVIEW -->
    <section class="preview-section">
      <div class="section-label">Live transcript</div>
      <div id="transcript-preview" class="preview-box">
        <em>Captions will appear once you enable CC...</em>
      </div>
    </section>

    <!-- SECTION 5 — EMAIL INPUT WITH TAG CHIPS -->
    <section class="email-section">
      <div class="section-label">Send report to</div>
      <div id="email-tags" class="email-tags">
        <!-- Tags injected by JS -->
      </div>
      <input id="email-input" type="text" class="email-input" placeholder="Add email and press Enter" />
    </section>

    <!-- SECTION 6 — ACTION BUTTONS -->
    <section class="actions-section">
      <button id="btn-summarize" class="btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <span>Summarize & Email PDF</span>
      </button>
      <div class="secondary-actions">
        <button id="btn-clear" class="btn-secondary">Clear</button>
        <button id="btn-download" class="btn-secondary">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          <span>Download PDF</span>
        </button>
      </div>
    </section>

    <!-- SECTION 7 — STATUS MESSAGE -->
    <div id="message" class="message" hidden></div>

    <script src="lib/jspdf.umd.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
