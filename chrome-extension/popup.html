<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meet Summarizer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ─── HEADER ─────────────────────────────────────────────────────────── -->
    <header class="header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
            stroke="#4285F4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Meet Summarizer</span>
      </div>
      <div id="status-badge" class="badge badge--idle">Idle</div>
    </header>

    <!-- ─── TRANSCRIPT STATS ───────────────────────────────────────────────── -->
    <section class="card">
      <div class="stat-row">
        <div class="stat">
          <span class="stat__value" id="word-count">0</span>
          <span class="stat__label">Words Captured</span>
        </div>
        <div class="stat">
          <span class="stat__value" id="line-count">0</span>
          <span class="stat__label">Lines</span>
        </div>
      </div>
      <div class="transcript-preview" id="transcript-preview">
        <em>Captions will appear here once you enable CC in Google Meet…</em>
      </div>
      <button class="btn btn--ghost btn--sm" id="btn-clear">Clear Transcript</button>
    </section>

    <!-- ─── EMAIL INPUT ────────────────────────────────────────────────────── -->
    <section class="card">
      <label class="label" for="email-input">
        Recipient Emails <span class="hint">(comma-separated)</span>
      </label>
      <input
        id="email-input"
        type="text"
        class="input"
        placeholder="alice@example.com, bob@example.com"
      />
    </section>

    <!-- ─── ACTIONS ────────────────────────────────────────────────────────── -->
    <section class="actions">
      <button class="btn btn--primary" id="btn-summarize">
        Generate Summary &amp; Email PDF
      </button>
    </section>

    <!-- ─── STATUS MESSAGE ────────────────────────────────────────────────── -->
    <div class="message" id="message" hidden></div>

    <script src="popup.js"></script>
  </body>
</html>
